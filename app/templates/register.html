{% extends "base.html" %}
{% block title %}Registrati{% endblock %}
{% block content %}
<h2>Registrazione</h2>
<form method="post">
    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    <button class="btn btn-primary">Registrati</button>
</form>
<p class="mt-2">Hai già un account? <a href="{{ url_for('main.login') }}">Accedi</a></p>
{% endblock %}
